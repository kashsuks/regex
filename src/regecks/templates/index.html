<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Regex Engine</title>
  <link rel="stylesheet" href="/static/css/style.css" />
</head>
<body>
  <div class="container">
    <header>
      <h1>Regex Engine</h1>
      <p class="subtitle">A from-scratch regular expression engine</p>
    </header>

    <main>
      <section class="input-section">
        <div class="field">
          <label for="pattern">Pattern</label>
          <input
            id="pattern"
            type="text"
            placeholder="e.g. \d+, [a-z]+, (foo|bar)"
            autocomplete="off"
            spellcheck="false"
          />
        </div>

        <div class="field">
          <label for="text">Test String</label>
          <textarea
            id="text"
            rows="4"
            placeholder="Enter the string to test against..."
            spellcheck="false"
          ></textarea>
        </div>

        <div class="controls">
          <div class="mode-toggle">
            <label>
              <input type="radio" name="mode" value="first" checked /> First match
            </label>
            <label>
              <input type="radio" name="mode" value="all" /> All matches
            </label>
          </div>
          <button id="run-btn">Run</button>
        </div>
      </section>

      <section class="output-section">
        <div id="error-box" class="error-box hidden"></div>
        <div id="highlight-box" class="highlight-box hidden">
          <h3>Highlighted Matches</h3>
          <div id="highlighted-text"></div>
        </div>
        <div id="results-box" class="results-box hidden">
          <h3>Match Details</h3>
          <table id="results-table">
            <thead>
              <tr>
                <th>#</th>
                <th>Match</th>
                <th>Start</th>
                <th>End</th>
                <th>Groups</th>
              </tr>
            </thead>
            <tbody></tbody>
          </table>
        </div>
        <div id="no-match-box" class="no-match-box hidden">
          No match found.
        </div>
      </section>
    </main>

    <footer>
      <p>Supported: <code>.</code> <code>*</code> <code>+</code> <code>?</code>
         <code>|</code> <code>( )</code> <code>[ ]</code>
         <code>^</code> <code>$</code>
         <code>\d \w \s</code> (and uppercase negations)</p>
    </footer>
  </div>

  <script src="/static/js/main.js"></script>
</body>
</html>
